<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Elegant Salon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Elegant Salon</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="contact">
    <div class="container">
      <h2>Get In Touch</h2>
      <div class="contact-content">
        <div class="contact-info">
          <h3>Visit Us</h3>
          <p>123 Beauty Street, Glamour City</p>
          <p>Phone: (555) 123-4567</p>
          <p>Email: info@elegantsalon.com</p>
          <p>Hours: Mon-Fri 9am-7pm, Sat 9am-5pm, Sun 10am-4pm</p>
        </div>
        <div class="contact-form">
          <h3>Send us a Message</h3>
          <form id="contactForm">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone (Optional)</label>
              <input type="tel" id="phone" name="phone">
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
          </form>
          <div id="formMessage" class="form-message"></div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Elegant Salon. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
